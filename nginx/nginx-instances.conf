# Nginx 配置文件 - SillyTavern 多开管理平台
# 使用路径转发：http://域名:端口/用户名/st
# 支持多实例配置

# 基本配置
# user 根据系统自动选择：Ubuntu/Debian 使用 www-data，CentOS/RHEL 使用 nginx
user www-data;
worker_processes auto;
pid /run/nginx.pid;
# include /etc/nginx/modules-enabled/*.conf;  # Ubuntu/Debian 特有，CentOS 可能没有

events {
    worker_connections 768;
    # multi_accept on;
}

http {
    ##
    # WebSocket 升级支持
    ##
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    ##
    # 基本设置
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL 设置
    ##
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    ##
    # 日志设置
    ##
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    ##
    # 定义上游服务器
    ##
    
    # 管理平台主服务
    upstream st_manager {
        server 127.0.0.1:3000;
    }
    
    # 主转发服务
    upstream st_main_forward {
        server 127.0.0.1:7091;
    }
    
    # 实例服务器示例
    upstream st_instance_1 {
        server 8.210.210.211:7092;
    }
    
    # 示例：添加多个实例
    upstream st_instance_2 {
        server example.com:7092;
    }

    ##
    # 虚拟主机配置
    ##
    
    server {
        listen 7092;
        server_name localhost;  # 替换为您的域名
        
        # 主服务（管理平台）
        location / {
            proxy_pass http://st_manager;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # 增加超时时间
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # API路由
        location /api/ {
            proxy_pass http://st_manager;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        
        # 用户SillyTavern实例路径转发（用户路径规则）
        # 匹配 /用户名/st 路径
        location ~ ^/([^/]+)/st(/.*)?$ {
            set $username $1;
            
            # 添加尾部斜杠重定向（如果没有）
            if ($request_uri ~ ^/([^/]+)/st$) {
                return 301 /$username/st/;
            }
            
            # 路径重写
            rewrite ^/([^/]+)/st/(.*)$ /$2 break;
            
            # 转发到主转发端口
            proxy_pass http://st_main_forward;
            proxy_http_version 1.1;
            
            # 设置Cookie标识用户
            add_header Set-Cookie "st_context=$username; Path=/; Max-Age=86400; SameSite=Lax";
            
            # WebSocket支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            
            # 代理头配置
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # 在请求头中添加用户标识，方便转发服务识别
            proxy_set_header X-ST-Username $username;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # 启用缓冲以便处理响应
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 100 128k;
            proxy_busy_buffers_size 256k;
        }
        
        # 静态资源回退路由 - 处理可能的404
        location ~ ^/.*\.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            try_files $uri @fallback;
        }
        
        # 回退路径 - 尝试从管理平台获取静态资源
        location @fallback {
            proxy_pass http://st_manager$uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
