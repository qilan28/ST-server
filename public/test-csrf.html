<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSRF Token Test</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>CSRF Token 测试页面</h1>
    <button id="testToken">测试获取 CSRF Token</button>
    <div id="result"></div>

    <script>
        $('#testToken').click(async function() {
            try {
                console.log('开始获取 CSRF token...');
                const response = await fetch('/csrf-token');
                const data = await response.json();
                console.log('CSRF token 获取成功:', data);
                
                $('#result').html(`
                    <h3>测试结果：成功</h3>
                    <p><strong>Token:</strong> ${data.token}</p>
                    <p><strong>状态码:</strong> ${response.status}</p>
                    <p><strong>时间:</strong> ${new Date().toLocaleString()}</p>
                `);
            } catch (error) {
                console.error('获取 CSRF token 失败:', error);
                $('#result').html(`
                    <h3>测试结果：失败</h3>
                    <p><strong>错误:</strong> ${error.message}</p>
                    <p><strong>时间:</strong> ${new Date().toLocaleString()}</p>
                `);
            }
        });

        // 模拟 SillyTavern 的初始化过程
        async function simulateFirstLoadInit() {
            try {
                const tokenResponse = await fetch('/csrf-token');
                const tokenData = await tokenResponse.json();
                const token = tokenData.token;
                console.log('模拟 SillyTavern 初始化成功，token:', token);
                return token;
            } catch (error) {
                console.error('模拟初始化失败:', error);
                throw new Error('Initialization failed');
            }
        }

        // 页面加载时自动测试
        $(document).ready(function() {
            simulateFirstLoadInit().then(token => {
                $('#result').html(`
                    <h3>自动测试：成功</h3>
                    <p>页面加载时自动获取 CSRF token 成功</p>
                    <p><strong>Token:</strong> ${token}</p>
                `);
            }).catch(error => {
                $('#result').html(`
                    <h3>自动测试：失败</h3>
                    <p><strong>错误:</strong> ${error.message}</p>
                `);
            });
        });
    </script>
</body>
</html>
